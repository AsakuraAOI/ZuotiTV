<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>做题蛆度量表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-primary: #E8E8E8;
      --text-secondary: #A0A0B0;
      --accent: #5B9BD5;
      --accent-hover: #4A8AC4;
    }

    body {
      background: linear-gradient(160deg, #5B9BD5 0%, #1a1a2e 25%, #0a0a0a 50%, #1a1a2e 75%, #E8A857 100%);
      background-attachment: fixed;
      min-height: 100vh;
      color: var(--text-primary);
      line-height: 1.6;
      font-family: 'Inter', sans-serif;
    }

    .page-wrapper {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    html {
      scroll-behavior: smooth;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Navigation */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 1000;
      padding: 1rem 2rem;
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
    }

    .nav-logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    /* Hero */
    .hero {
      min-height: 30vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 2rem;
      width: 100%;
    }

    .hero-content {
      max-width: 700px;
      width: 100%;
    }

    .hero-content h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .hero-subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      margin: 0 auto 1.5rem;
    }

    /* Main */
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 1.5rem;
      width: 100%;
    }

    .glass-card {
      width: 100%;
    }

    @media (max-width: 768px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Glass Card */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(200%) brightness(1.1);
      -webkit-backdrop-filter: blur(20px) saturate(200%) brightness(1.1);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      color: var(--text-primary);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.15),
        inset 0 -1px 0 rgba(0, 0, 0, 0.1);
    }

    .glass-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.25) 0%,
        rgba(255, 255, 255, 0.1) 30%,
        rgba(255, 255, 255, 0.05) 60%,
        rgba(255, 255, 255, 0.15) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      padding: 1.5rem;
    }

    .card-label {
      display: block;
      font-size: 0.85em;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      padding: 12px;
      font-size: 14px;
      resize: vertical;
      min-height: 220px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .examples-label {
      font-size: 0.78em;
      color: rgba(255,255,255,0.4);
      margin: 0.75rem 0 0.5rem;
    }

    .examples-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .example-chip {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .example-chip:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .config-grid.full {
      grid-template-columns: 1fr;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text-primary);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.8rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
      font-size: 14px;
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(91, 155, 213, 0.35);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      box-shadow: none;
      transform: translateY(-2px);
    }

    /* Result */
    .score-display {
      text-align: center;
      padding: 1rem 0;
    }

    .score-number {
      font-size: 4rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-number.green { color: #33CC66; }
    .score-number.yellow { color: #FFCC00; }
    .score-number.orange { color: #FF7733; }
    .score-number.red { color: #FF4444; }

    .score-denom {
      font-size: 1.2rem;
      font-weight: 400;
      opacity: 0.5;
    }

    .level-badge {
      display: inline-block;
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    .level-badge.green { background: rgba(51, 204, 102, 0.2); color: #33CC66; }
    .level-badge.yellow { background: rgba(255, 204, 0, 0.2); color: #FFCC00; }
    .level-badge.orange { background: rgba(255, 119, 51, 0.2); color: #FF7733; }
    .level-badge.red { background: rgba(255, 68, 68, 0.2); color: #FF4444; }

    .level-desc {
      font-size: 0.85em;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    .divider {
      border-top: 1px solid var(--glass-border);
      margin: 1rem 0;
    }

    .analysis-text {
      font-size: 0.9em;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    #radar-container {
      width: 100%;
    }

    .indicators-list {
      list-style: none;
    }

    .indicators-list li {
      padding: 5px 0;
      font-size: 13px;
      color: #ff6666;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .indicators-list li:last-child {
      border-bottom: none;
    }

    /* Error */
    #error-box {
      background: rgba(200, 50, 50, 0.15);
      border: 1px solid rgba(200, 80, 80, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      color: #ff8888;
      font-size: 14px;
      display: none;
      margin-bottom: 1rem;
    }

    /* Loading */
    #loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--text-secondary);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      .config-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="#" class="nav-logo">做题蛆度量表</a>
      </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-content">
        <h1 style="font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; line-height: 1.1; color: #fff; margin-bottom: 0.5rem;">做题蛆度量表</h1>
        <p class="hero-subtitle">输入文本，AI 将分析其中的做题蛆特征并给出评分</p>
      </div>
    </section>

    <!-- Main -->
    <div class="main-content">

    <div id="error-box"></div>
    <div id="loading"><span class="spinner"></span>分析中...</div>

    <div class="content-grid">
      <!-- Left: Input -->
      <div>
        <div class="glass-card">
          <div class="card-inner">
            <label class="card-label">输入文本</label>
            <textarea id="text-input" placeholder="粘贴或输入需要分析的文本..."></textarea>
            <div class="examples-label">示例（点击即可加载）</div>
            <div class="examples-list">
              <div class="example-chip" onclick="loadExample(0)">600分不配和我讨论</div>
              <div class="example-chip" onclick="loadExample(1)">五道口职业技术学院</div>
              <div class="example-chip" onclick="loadExample(2)">700分志愿填报</div>
              <div class="example-chip" onclick="loadExample(3)">弱肉强食</div>
            </div>
          </div>
        </div>

        <div class="glass-card" style="margin-top: 1rem;">
          <div class="card-inner">
            <label class="card-label">API 配置</label>
            <div class="config-grid">
              <input type="password" id="api-key" placeholder="API Key（sk-...）" autocomplete="off">
              <input type="text" id="base-url" placeholder="https://api.siliconflow.cn/v1" autocomplete="off">
            </div>
            <div class="config-grid full" style="margin-top: 10px;">
              <input type="text" id="model" placeholder="Model（默认: deepseek-ai/DeepSeek-V3.2）" autocomplete="off">
            </div>
            <div class="btn-row">
              <button class="btn" id="analyze-btn" onclick="doAnalyze()">分析</button>
              <button class="btn btn-secondary" onclick="doClear()">清空</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Result -->
      <div>
        <div class="glass-card" id="result-card" style="display:none;">
          <div class="card-inner">
            <div class="score-display">
              <div class="score-number" id="score-number">0<span class="score-denom">/100</span></div>
              <div class="level-badge green" id="level-badge">正常</div>
              <div class="level-desc" id="level-desc"></div>
            </div>
            <div class="divider"></div>
            <div class="analysis-text" id="analysis-text"></div>
          </div>
        </div>

        <div class="glass-card" id="radar-card" style="display:none; margin-top: 1rem;">
          <div class="card-inner">
            <label class="card-label">十一边向分析</label>
            <div id="radar-container"></div>
          </div>
        </div>

        <div class="glass-card" id="indicators-card" style="display:none; margin-top: 1rem;">
          <div class="card-inner">
            <label class="card-label">匹配到的话术</label>
            <ul class="indicators-list" id="indicators-list"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">做题蛆度量表 v1.0</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const EXAMPLES = [
      "600分以下不配和我讨论，你知道我高中每天做多少题吗？累就对了，舒服是留给死人的！",
      "我就是五道口职业技术学院的小菜鸡，随便复习了一下没考好，才考了班级前十。",
      "高考700分的人志愿填报一定高瞻远瞩，500多分的人根本不懂教育。",
      "你不努力，活该被淘汰！这个社会就是弱肉强食，心理承受能力差的人不适合这个社会。",
    ];

    const DIM_NAMES = {
      ideology_poor_sin: "穷人原罪论",
      test_worship: "做题万能论",
      social_darwinism: "社会达尔文主义",
      study_pattern: "做题行为模式",
      vanity: "炫耀/凡尔赛",
      idol_worship: "权威崇拜",
      power_abuse: "权力滥用",
      psychology: "心理/情绪",
      values: "价值观",
      catchphrases: "经典话术",
      sex_intimacy: "性/亲密关系扭曲",
    };

    let radarChart = null;

    function loadExample(i) {
      document.getElementById("text-input").value = EXAMPLES[i];
    }

    function showError(msg) {
      const el = document.getElementById("error-box");
      el.textContent = msg;
      el.style.display = "block";
    }

    function hideError() {
      document.getElementById("error-box").style.display = "none";
    }

    function getScoreColor(score) {
      if (score >= 81) return "#FF4444";
      if (score >= 61) return "#FF7733";
      if (score >= 36) return "#FFCC00";
      return "#33CC66";
    }

    function getLevelInfo(score) {
      if (score <= 15) return { label: "正常", desc: "爱学习但不执念，理解多元价值体系。", cls: "green" };
      if (score <= 35) return { label: "做题倾向", desc: "有做题思维但未固化，偶尔陷入排名焦虑。", cls: "green" };
      if (score <= 60) return { label: "做题家", desc: "深度认同做题即正义，成绩是核心价值判断标准。", cls: "yellow" };
      if (score <= 80) return { label: "做题蛆（轻度）", desc: "三位一体意识形态初步形成，开始鄙视非做题路径。", cls: "orange" };
      if (score <= 100) return { label: "做题蛆（重度）", desc: "完全体做题蛆，坚信社会达尔文主义。", cls: "red" };
      return { label: "间桐樱", desc: "压抑到极致后的彻底黑化，已分不清是在做题还是在自我毁灭。", cls: "red" };
    }

    function drawRadar(dimScores) {
      const container = document.getElementById("radar-container");
      container.innerHTML = '<canvas id="radar-canvas"></canvas>';

      const labels = Object.keys(dimScores).map(k => DIM_NAMES[k] || k);
      const data = Object.values(dimScores);
      const color = "#5B9BD5";

      if (radarChart) radarChart.destroy();

      radarChart = new Chart(document.getElementById("radar-canvas"), {
        type: "radar",
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: "rgba(91, 155, 213, 0.2)",
            borderColor: color,
            borderWidth: 2,
            pointBackgroundColor: color,
            pointRadius: 4,
            fill: true,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          aspectRatio: 1.3,
          scales: {
            r: {
              min: 0, max: 10,
              ticks: { stepSize: 2, backdropColor: "transparent", color: "#666", font: { size: 10 } },
              grid: { color: "rgba(255,255,255,0.1)" },
              angleLines: { color: "rgba(255,255,255,0.1)" },
              pointLabels: { color: "#aaa", font: { size: 11 } },
            }
          },
          plugins: { legend: { display: false } },
        }
      });
    }

    function renderResult(data) {
      const score = data.score || 0;
      const level = getLevelInfo(score);

      const scoreNum = document.getElementById("score-number");
      scoreNum.className = "score-number " + (score >= 81 ? "red" : score >= 61 ? "orange" : score >= 36 ? "yellow" : "green");
      scoreNum.innerHTML = `${score}<span class="score-denom">/100</span>`;

      const badge = document.getElementById("level-badge");
      badge.className = "level-badge " + level.cls;
      badge.textContent = level.label;

      document.getElementById("level-desc").textContent = level.desc;
      document.getElementById("analysis-text").textContent = data.analysis || "";

      const indicators = data.matching_indicators || [];
      const indCard = document.getElementById("indicators-card");
      const indList = document.getElementById("indicators-list");
      if (indicators.length > 0) {
        indList.innerHTML = indicators.map(m => `<li>${m}</li>`).join("");
        indCard.style.display = "block";
      }

      drawRadar(data.dimension_scores || {});

      document.getElementById("result-card").style.display = "block";
      document.getElementById("radar-card").style.display = "block";
    }

    async function doAnalyze() {
      hideError();
      const text = document.getElementById("text-input").value.trim();
      const apiKey = document.getElementById("api-key").value.trim();
      const baseUrl = document.getElementById("base-url").value.trim() || "https://api.siliconflow.cn/v1";
      const model = document.getElementById("model").value.trim() || "deepseek-ai/DeepSeek-V3.2";

      if (!text) { showError("请输入需要分析的文本（至少5个字符）"); return; }
      if (!apiKey) { showError("请先填写 API Key"); return; }

      document.getElementById("loading").style.display = "block";
      document.getElementById("analyze-btn").disabled = true;
      document.getElementById("result-card").style.display = "none";
      document.getElementById("radar-card").style.display = "none";
      document.getElementById("indicators-card").style.display = "none";

      try {
        const res = await fetch("/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, api_key: apiKey, base_url: baseUrl, model }),
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || `API 错误 ${res.status}`);
        }

        const data = await res.json();
        renderResult(data);
      } catch (e) {
        showError("分析失败: " + e.message);
      } finally {
        document.getElementById("loading").style.display = "none";
        document.getElementById("analyze-btn").disabled = false;
      }
    }

    function doClear() {
      document.getElementById("text-input").value = "";
      document.getElementById("result-card").style.display = "none";
      document.getElementById("radar-card").style.display = "none";
      document.getElementById("indicators-card").style.display = "none";
      hideError();
      if (radarChart) { radarChart.destroy(); radarChart = null; }
    }

  </script>
</body>
</html>
